front:
  text: 物不遷論辨解題辭常人即不遷見流動智者即流動見不遷故曰人之所謂動者以昔物不至今吾之所謂靜者亦以昔物不至今而或者駁之謂肇公立昔有今無為斷常遷滅之法是大不然嘗為之頌曰昔自在昔昔非來今自在今今不往昔今非往亦非來以是知法相常住或者執藥成病刻舟求劒不慧甚矣幻居界公物不遷解之所由出也日照四天下本無次第而方位湛然智者作日軌察之愚者倒操日軌方位亦倒界公之解其操日軌之法與乃刻而流通之萬曆己丑五月望日真實居士憑夢禎題物不遷論辨解序夫至虗無物物非物以皆離法性不遷遷非遷而俱泯蓋物形無物遷待不遷乃心意之所通而言說之可及也豈動靜不異難言之旨乎然所謂物不遷者非物無物也非遷不遷也但執藉法除病須藥治故對計常者即不遷以明遷而因執遷者即遷以明不遷是皆導物之假名應病之良藥耳則不遷之理豈容以遷不遷而思議者歟而或者因藥致病捫虗為實不解物各性住之言是明真諦無性之旨而抑之駁之是一夢也余復從而辨之又一夢矣則非遷非不遷之理又豈容以夢語而達之者哉雖然因夢而覺夢是又不可無說也同志者決之萬曆丁酉孟秋朔日寓雙徑沙門真界謹序
