body:
  text: 檇李沙門真界解夫生死交謝寒暑迭遷有物流動人之常情此述常人所迷為不遷一論之發起也蓋常人謂生死去來交相遷謝寒暑去來迭互變遷然不知諸法本來常自寂滅本無身心生死亦無寒暑去來是以妄見物遷而不知物不遷也所言物不遷者事像可觀稱之為物物體寂滅故號不遷不遷故則物物當處而自寂為物故與四象更互而為依然物性無差悟即真理真本不變物自湛然常情所封於不動中妄以為動所謂雲駛月運舟行岸移故宗鏡云若了真心不動則萬法不遷若見萬法遷謝皆是妄心以一切境界唯心妄動若離心識則尚無一法常住豈況有萬法遷移故下廣引經論之言以對破也余則謂之不然何者放光云法無去來無動轉者此反上以明不遷也夫諸法之體離去來相無動轉相何者謂一切諸法緣會而來來無所從緣離而去去無所至是則即去來而無去來即動轉而無動轉故放光云法無去來無動轉也雖然而常人不達緣生無性無有去來則妄見諸法去來故於身見生死交謝於世見寒暑迭遷論主愍之遂本法無去來無有動轉立論以破常人有物流動之見也尋夫不動之作豈釋動以求靜必求靜於諸動必求靜於諸動故雖動而常靜不釋動以求靜故雖靜而不離動此原般若立言之意以為作論之本也蓋不動之作既非釋動求靜而必求靜於動則動靜不異故於下文說遷即不遷以明遷不異不遷說不遷即遷以明不遷不異於遷也然則動靜未始異而惑者不同緣使真言滯於競辯宗途屈於好異所以靜躁之極未易言也呈上以明立言之難也然動靜不異則遷與不遷不相異也以不異故遷而不遷不可謂之遷不遷而遷亦不可謂之不遷矣而惑者不同則遷與不遷不相同也以不同故執遷者則謂之遷執不遷者又謂之不遷致使離言之真滯於競辯不異之宗屈於好異所以動靜不異未易言也何者夫談真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味緣使中人未分於存亡下士撫掌而弗顧近而不可知者其唯物性乎然不能自已聊復寄心於動靜之際豈曰必然徵釋難言所以即結舉難知之性以起說也何靜躁之極未易言耶談真下釋也謂談不遷則逆於遷順於遷則違不遷違不遷迷性莫返逆於遷言淡無味故使中人聞之如存若亡下士聞之撫掌弗顧今欲談不遷不逆於遷說遷不違不遷而使中下聞之各得信解者誠不易言故靜躁之極未易言也是以下常人謂昔物不至今而論主亦謂昔物不至今雖談說不遷不離其遷故不逆於遷以不逆遷而言不遷故則意深而有味故能使中下聞之而各得信解也又下云人命逝速速於川流蓋對計常者以無動無滅而言遷言雖似遷而遷即不遷故不違不遷以不違不遷而言遷故則迷性而可返故二乘之人聞而悟解以成道即真也然則不異之極非惟言之不易抑亦知之甚難故云近而不可知者其唯物性乎然雖難言難知而不能自已故聊復寄心於動靜之際以明遷與不遷豈曰必然蓋以說遷乃即不遷以明遷豈必於遷說不遷乃即遷以明不遷豈必不遷故云聊寄動靜豈曰必然也試論之曰道行云諸法本無所從來去亦無所至中觀云觀方知彼去去者不至方斯皆即動而求靜以知物不遷明矣此引經論之言以明不遷也蓋一切諸法來有所從去有所至可謂之遷以來無所從去無所至法不相至故不遷也言觀方知彼去者如人從東至西以方而觀如似有去故云觀方知彼去去不至方者謂去無所去也故論偈云已去無有去未去亦無去離已去未去去時亦無去鈔云如人初在東方卓立不動即名未去未去故未去不得名為去以去法未萌故若動一步離本立處反望立處則名已去已去故已去不得名為去由去法已謝故惑人便轉計云動處則有去此中有去時非已去未去是故去時去龍樹便以相待破云若有已去未去則有去時若無已去未去則無去時如因兩邊短有中間長若無兩邊短即無中間長故偈云離已去未去去時亦無去是則三時無去以明去無所去非以無去為無去故云去者不至方也斯皆下會經論意宗歸不遷然此不遷之理隱奧難明今復以事顯之如人從一步而至三步若第一步去第二步來第二步去則第三步來是則有去有來即所謂動也然凡有去來即屬緣生既屬緣生即無自性既無自性全體即空若是則第一步去去無所去第二步來來無所來一步如是步步皆然由是而知諸法即去來而無去來即動轉而無動轉故云即動而求靜以知物不遷即遷而不遷豈有物而可動哉夫人之所謂動者以昔物不至今故曰動而非靜我之所謂靜者亦以昔物不至今故曰靜而非動動而非靜以其不來靜而非動以其不去此即常人之遷以明不遷也蓋常人謂昔物不至今以見昔物遷去於昔故不至於今故曰動而非靜此則不達緣生無性則見物遷去所以謂之動也論主謂昔物不至今以見昔物緣生無性去即不去故不至於今故曰靜而非動此則了達緣生無性則去即不去所以謂之靜也動而非靜以其不來者蓋以其昔物遷去於昔故不來也靜而非動以其不去者蓋以其昔物去即不去故不去也然則昔物既從緣空故不去不來有何物而可動哉如是則遷流之見謝而諸法性空之理明矣而或人由不達肇公所見緣生無性之理又錯解靜而非動以其不去之文遂謂肇公所言昔物不至今者如前舟載魚後舟載筍前舟之魚自住前舟不至後舟故以昔物住昔不來而駁之是乃或人之謬解耳豈肇公之見也哉又靜而非動以其不去者蓋以其昔物緣離而去去即不去故云不去非謂昔物住昔而不去也而或人由錯解靜而不去之文遂以昔物住昔不去而駁之故知其文理俱不通矣且或人本不達肇公所明物不遷理又見清涼疏鈔謂肇公所言物不遷濫於小乘遂即倚傍其言而抑之駁之此又不通疏鈔之意也蓋疏鈔謂肇公所言物不遷濫於小乘者以小乘論云有為之法若此處生即此處滅無容從此轉至餘方鈔釋曰此生此滅不至餘方同不遷義而有法體是生是滅故非大乘大乘之法緣生無性生即不生滅即不滅故遷即不遷則其理懸隔然肇公論則含二意顯文所明多同前義蓋由肇公意以物各性住為不遷則濫小乘無容從此轉至餘方故然下論云談真有不遷之稱導俗有流動之說此則以真諦為不遷而不顯真諦之相若但用於物各性住為真諦相寧非性空無可遷也已上皆疏鈔文然疏鈔既云含有二意則不獨小乘矣又云顯文所明多同前義者蓋以物各性住與小乘無容從此轉至餘方文義多同理實懸隔也又云若但用於物各性住為真諦相寧非性空無可遷者蓋真諦則泯一切法也既以物各性住為真諦相豈非是以無物無住而為真諦不遷者哉故永明亦謂肇公所言性住是以無性為性也既以性空真諦為不遷豈得濫同小乘生滅之理乎縱清涼謂濫於小乘不云同於凡夫而或人既以昔物住昔不來而駁之則抑同常見凡夫矣若是則尚不能同於小乘又豈能安住大乘而濫於小乘耶是則非惟於疏鈔文義不通亦乃與倚傍言意相悖良可歎也又或人亦由不達肇公所明緣生無性無有去來之靜妄謂肇公以昔物住昔不去謂之靜者蓋有物有住即有為有為即生滅安得謂之靜乎斯亦或人之謬解耳又豈肇公之見也哉此正所謂於無過中求其有過不特謗法亦且欺人又謂非駁肇公將以駁天下之所是則又不特只欺肇公又乃輕欺天下之人矣竊思或人之所以招謗法欺人之罪者非有他心但以其不識文理而致然也可不審哉然則所造未甞異所見未甞同逆之所謂塞順之所謂通苟得其道復何滯哉明上造雖同而見不同也蓋昔物不至今一耳然其所見誠迷悟不同故云所造未嘗異所見未嘗同以見物遷去則逆乎無生常以是塞故云逆之所謂塞見物不去則順乎無生真以之通故云順之所謂通苟悟物物緣生無性而無生則不為去來動轉之所留滯矣故云苟得其道復何滯哉傷夫人情之惑久矣目對真而莫覺既知往物而不來而謂今物而可往往物既不來今物何所往何則求向物於向於向未嘗無責向物於今於今未嘗有於今未嘗有以明物不來於向未嘗無故知物不去覆而求今今亦不往歎常人所迷委辯法無去來以明物不遷也目對真而莫覺者謂萬法本如不動不變不離當處常自湛然而常人日用不覺所以聖人傷歎之也既知下牒上以明今昔之物各不相到謂既知往物而不來今則今物又豈往於昔乎往物下牒定不相到義何則下徵辯物不相到立不遷義以破有物流動之見言求向物於向於向未嘗無者謂向物緣生無性去即不去無即不無故云於向未嘗無非謂向物住向而不無也又因常人見向物遷去執以為無故此明去即不去無即不無是乃即常人之遷以明不遷也責向物於今於今未嘗有者謂向物既緣生無性則不至於今故今不有向也於今下牒明向物不來於向下牒明向物不去然則向物之所以不去者蓋向物以緣離而去去即不去故云不去非謂向物住向而不去也而或人自不解說者之意反以向有墮常今無墮斷而駁之豈異跛驢不能疾步而反責駿馬之奔逸者也覆而求今今亦不往者謂向物既從緣無性而不來則今物亦從緣無性而不往蓋今物不往亦往即不往也故華嚴云譬如河中水湍流競奔逝各各不相知諸法亦如是斯乃即湍流奔逝不妨波波從緣無體而不相周到故各不相知如即今昔競往不妨物物緣生無性而不相往來故各不相至故華嚴云諸法無體性亦無有作用是故彼一切各各不相知也然此既以物物從緣無性不相往來而明不遷是乃即遷以明不遷矣又安容以向有今無斷常遷滅之妄議而參於其間哉是謂昔物自在昔不從今以至昔今物自在今不從昔以至今此呈上今昔之物各不相至也上二句呈今不至昔下二句呈昔不至今所言昔物在昔等者謂昔物不來如似在昔故云昔物自在昔非遷今以至昔故不從今至昔今物不往如似在今故云今物自在今非遷昔以至今故不從昔至今是則今昔不相至法法不相到有何物而可遷乎然則所謂昔物在昔今物在今者良以今昔之物從緣無性不相往來假名曰在實無所在也蓋在猶去來既無去來安得有在故清凉以物各性住為真諦相則知物物無物在亦無在矣是則無去無來亦無所住故名為之不遷也而或人固守其文不會其意遂以有物有在而駁之得不自招謬斥之過歟故仲尼曰回也見新交臂非故引證今昔之物各不相至也言見新非故者謂新故從緣無性而不相至則新不至故故不至新故見新非故也然此引新故從緣無性而不相至以證今昔之物各不相至者正顯萬法從緣而無自體故各不相知相到也如此則物不相往來明矣既無往返之微朕有何物而可動乎結上往物不來今物不往也言無住返之微朕者謂今物從緣無性不去於昔故不往往物亦從緣無性不來於今故不返既無往返之微迹有何物而可動哉然則旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周復何怪哉此引動而不動之事以成上遷而不遷之理也若約比量而言量云諸法是有法遷而不遷是宗法因云物物緣生無性而不相至故同喻云前波非後波等所謂物物緣生無性而不相至等者蓋以物物從緣空故不相往來如波波從緣無體而不相至是故諸法遷而不遷也故宗鏡釋云前風非後風故偃嶽而常靜前波非後波故競注而不流前氣非後氣故飄鼓而不動前日非後日故歷天而不周理本如是復何怪焉是則三支無過能立極成矣而或人竟謂肇公立法宗似因非有宗無因者以其錯解肇公之意故也何者肇公原以物無去來之義明不遷不以有物有住明不遷而或人既錯解其意遂以有物有住為不遷因故云有宗無因以致妄談般若謬斥先聖可不辯哉然則是辯也非特辯或人也亦將以辯為或人之所昧者蓋或人一也容可已也昧其言者或未可必也難可已也余豈好辯哉將恐昧其言者亦墮謗法之坑故也噫聖人有言曰人命逝速速於川流是以聲聞悟非常以成道緣覺覺緣離以即真苟萬動而非化豈尋化以階道覆尋聖言微隱難測若動而靜似去而留可以神會難以事求此引聖人之言以明遷也或謂前說不遷此又何云遷耶答前對執遷者故云不遷乃即遷以明不遷不異於遷此對計常者故又云遷乃即不遷以明遷不異不遷故二乘悟滅即不滅遷即不遷以成道即真也苟萬下釋成所證苟誠也非化謂不遷也尋即也蓋二乘之所以成道即真者誠萬動而不遷故悟之以階道非即遷以階道也覆尋下明聖言難測若動下明難測所以蓋由聖人即無動無滅而言動言遷故若動而實不動似遷而實不遷是故若以神會即悟無動無滅以契不遷若以事求則但見其遷故云可以神會難以事求也明遷不遷竟是以言去不必去閑人之常想稱住不必住釋人之所謂往耳豈曰去而可遣住而可留耶此呈上文兩節之意也言去不必去等者蓋以說遷乃即不遷以言遷不異不遷故不必於遷但防人之常想耳說不遷乃即遷以稱不遷不異於遷故不必不遷但釋人之所往耳是知說遷不遷惟在拂人之情執本無定法可說豈可以遷為遷以不遷為不遷者哉故云豈曰去而可遣住而可留耶故成具云菩薩處計常之中而演非常之教摩訶衍論云諸法不動無去來處斯皆導達羣方兩言一會豈曰文殊而乖其致哉此引證上文兩節之意也先引經以證遷次引論以證不遷羣方者謂隨宜導達之方不一也兩言一會者謂說遷不異不遷說不遷不異於遷是雖對機言異而遷與不遷之致無殊故云豈曰文殊而乖其致哉是以言常而不住稱去而不遷不遷故雖往而常靜不住故雖靜而常往雖靜而常往故往而弗遷雖往而常靜故靜而弗留矣此結上文兩節之意也蓋前說不遷不異於遷故云言常而不住不住即遷也次文說遷不異不遷故云稱去而不遷不遷故雖遷而不遷不住故雖不遷而遷雖不遷而遷故遷而弗遷雖遷而不遷故弗遷而遷矣如是則遷與不遷未始暫異亦非遷非不遷而名物不遷耳前以諸法性空之義而明物不遷者乃真諦之不遷也此所謂不遷而遷遷而不遷非遷非不遷而明物不遷者乃中道第一義諦之不遷他詎可以遷不遷而思議者哉然則莊生之所以藏山仲尼之所以臨川斯皆感往者之難留豈曰排今而可往是以觀聖人心者不同人之所見得也此答外人之難以明聖人感往不同之意也或謂上來說遷不異不遷則莊生藏山仲尼臨川豈非遷乎答莊生之所以藏山仲尼之所以臨川斯皆為不覺遷者而感其已往難留豈同世人排今往昔之見是以云觀聖人心者不同人之所見得也何者人則謂少壯同體百齡一質徒知年往不覺形隨是以梵志出家白首而歸隣人見之曰昔人尚存乎梵志曰吾猶昔人非昔人也隣人皆愕然非其言也所謂有力者負之而趨昧者不覺其斯之謂歟此徵釋感往之意也何以聖人感往難留耶人則下引事以釋感往之意蓋時人唯知百齡一質而不覺念念遷訛故梵志白首而歸隣人見之曰昔人尚存梵志見其不悟即以言警之云吾猶昔人非昔人者豈非莊生仲尼之意乎然隣人猶不悟形遷故皆愕然而非其言莊生所謂夜半有力者負之而趨昧者不覺與隣人不悟形遷無以異也故云其斯之謂歟是以如來因羣情之所滯則方言以辯惑乘莫二之真心吐不一之殊教乖而不可異者其唯聖言乎故談真有不遷之稱導俗有流動之說雖復千途異唱會歸同致矣此結顯如來為機說教不同不乖一致以成上言殊致一也方言謂對機之言乃治病之方故云方言蓋以羣情所滯不一故如來乘一真心任病處方隨機說法雖復千差其理不異故云乖而不可異者其唯聖言乎故談真下結成言殊致一也而徵文者聞不遷則謂昔物不至今聆流動者而謂今物可至昔既曰古今而欲遷之者何也是以言往不必往古今常存以其不動稱去不必去謂不從今至古以其不來不來故不馳騁於古今不動故各性住於一世然則群籍殊文百家異說苟得其會豈殊文之能惑哉此對徵文滯句之士以明會理者不為文言所惑也夫凡所說法因群情耳豈有定法可說哉又豈容以如言取著者乎而徵文者不悟此意即如言取著故聞不遷則謂昔物不至今聆流動者又謂今物可至昔是以復就執遷者即遷而明不遷以拂如言取著之見也既曰下因聆流動者謂今物可至昔故先以不遷按定是以下正明遷而不遷之義拂其以遷為遷之見所謂言往不必往等者蓋以聖人對計常者雖說古今代謝物像變遷然不妨古今萬物俱緣生無性遷即不遷以說遷而物不遷故云言往不必往稱去不必去也以言往而古今不往故則古自住古今自住今故云古今常存蓋以其古今各住而不動故以稱去而今不去故則今不去古故不從今至古蓋以其古而不來今故然今古既不相往來則不馳騁於古今而古今既常存不動則各性住於一世矣然此既以古今緣生無性遷即不遷而言住則知性住是以無性為性無住為住故永明謂肇公所言性住是無性為性也若爾則古今之性尚不可得豈復有住乎況清涼亦以物各性住為真諦相豈以有物有住而為真諦之相者哉而或人既不達無性無住真諦之義反以有性有住而駁之得非妄談般若乎又今古既不相往來則知言往不往稱去不去而聆流動者豈可以往為往以去為去而謂今物可至昔耶則遷今至昔之見破矣然則下明會理者不為文言所惑羣籍殊文指眾經言百家異說就眾論言蓋明會理者知說遷不遷及殊文異說但為拂人之情執耳元無定法亦無殊致故不為文言所惑而如語取著也是以人之所謂住我則言其去人之所謂去我則言其住然則去住雖殊其致一也故經云正言似反誰當信者斯言有由矣此結顯言殊致一之義以明不可如語取著也蓋以人所謂住我言其去然雖言去不乖於住由其以無動無滅而云去故不乖住也又人所謂去我言其住然雖言住不乖於去由其以去來即無去來而云住故不乖去也是則去住言殊其致不異豈可如言取著者乎故經云下引證言殊致一也言正言似反者謂言去實不乖住說住實不異去故云似反言誰當信者以其言殊致一之義殆非言思可及故人所難信非唯難信亦且難測故前云可以神會難以事求則經之言信必有由矣何者人則求古於今謂其不住吾則求今於古知其不去今若至古古應有今古若至今今應有古今而無古以知不來古而無今以知不去若古不至今今亦不至古事各性住於一世有何物而可去來徵釋言反之意復詳辯不遷也何以人所謂去我言住耶人則下釋也蓋常人謂古能遷至於今故求古於今謂古不住此則人之所謂遷也吾則下明我之所謂不遷耳言求今於古知其不去者謂以今時緣生無性不去於古則於古求今而古中無今故知今不去古矣今若至古下反推古今不相至義今而無古下順明古今不相至義若古不至今下牒結不遷以破其遷則遷古至今之見破矣然前後諸文皆對遷以廣明不遷者欲人即遷而契不遷故論題名為物不遷者良有以也然則四象風馳璇璣電卷得意毫微雖速而不轉此引遷而不遷之事以成上古今遷而不遷也四象即四時凡四時備更一周年璇璣即北斗七星凡一日一夜一周天蓋取其遷也言得意毫微等者謂苟得緣生無性無有去來之意毫微則四時雖如風之馳璇璣如電之卷亦不可得而流轉矣是以如來功流萬世而常存道通百劫而彌固成山假就於始簣修途托至於初步果以功業不可朽故也功業不可朽故雖在昔而不化不化故不遷不遷故則湛然明矣故經云三灾彌綸而行業湛然信其言也此呈上古今不遷以明如來道業亦不遷也道即所證之理業即所修之因以其因真而果不謬故流萬世而常存通百劫而彌固也成山下引喻以明功業不滅果以下以法結明蓋成山假始簣而就長途托初步而至然始簣初步竟不可謂之滅不滅也何者謂始簣若滅山假何成始簣不滅始土尚存山相寧顯始簣既爾初步亦然由是而知其所謂昔因不化不遷者乃化而不化遷而不遷故云不化不遷非謂昔因住昔不化為不遷也而或人由不達化而不化遷而不遷之義妄以昔因住昔不化而駁肇公者得不謬斥先聖哉故經云下引證功業不滅然前則約物約時以論不遷此明如來功業不遷則知世出世法皆不遷也何者果不俱因因因而果因因而果因不昔滅果不俱因因不來今不滅不來則不遷之致明矣復何惑於去留踟蹰於動靜之間哉此徵釋昔因不化不滅以結不遷之致也何以昔因不化不滅耶果不下釋也蓋以因果從緣無性各各寂滅而不相至則果不至因因不來果故不俱也然雖不俱而不妨因因而果因因而果因不昔滅者滅而不滅也果不俱因因不來今者不滅而滅也既不滅而滅滅而不滅則不可謂之滅亦不可謂之不滅是則非滅非不滅非遷非不遷而名曰不遷則不遷之致明矣豈復迷惑踟蹰於遷不遷之間哉然此一節宗鏡引中論八不之義以會釋之如欲委悉請覽彼文然則乾坤倒覆無謂不靜洪流滔天無謂其動苟能契神於即物斯不遠而可知矣此結舉動而不動之事而許智與理冥境與神會者默而識之則非言思分別可能知也故宗鏡釋云若能觸境明宗契神即物假使天翻地覆海沸山崩尚不見動靜之朕兆況其餘之幻化影響乎故云苟能契神於即物斯不遠而可知凡究心者宜深鑒諸毋得自昧己靈妄談般若而謬斥先聖以招謗法之罪非惟自害亦害他人慎之哉慎之哉余抱病巖阿偃臥北窻下幻居界師從雙徑來持所解物不遷論示余徵言以䟦乃擁納起命童子讀而聽焉其大要主之以諸法寂滅而復量以三支融以中道第一義諦蓋不執論主之辭而自出其言外之意意切至而辭彰明矣顧余素寡昧今病且老筆研生塵尚不能處分目前其何能一息古今神會乎遷流不動玄旨力辭之弗獲也漫為寐語末簡萬歷丁酉普門示現日古杭雲棲寺沙門袾宏謹跋予聞入無生者方知剎那故五十計較經有菩薩白佛曰我罪滅如何不見罪滅之相佛曰汝曹心能轉生否對曰我心若不轉生則不能與如來共語佛曰汝曹心轉生時見心初生之相否對曰不知佛曰汝曹既不知心生初相豈罪滅相汝曹獨知之乎即此以觀心轉不轉生相滅相皆不越一剎那耳而物非物遷不遷又豈能越之哉予以是知駁不遷辯不遷者剎那未知無生尚遙而駁駁辯辯得非掉棒打月乎哉則予也亦不免多口之咎明釋達觀跋
